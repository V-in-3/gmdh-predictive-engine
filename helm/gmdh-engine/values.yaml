# Scoring engine configuration
scoring:
  # Available: bedrock_mock, ollama
  featureEngine: bedrock_mock
  # Available: bedrock_mock, gmdh, ollama
  scoringEngine: gmdh

# Ollama LLM
ollama:
  enabled: true
  # Available: tinyllama, phi3:mini, mistral
  model: tinyllama
  image: ollama/ollama:latest
  resources:
    requests:
      memory: "4Gi"
      cpu: "2"
    limits:
      memory: "6Gi"
      cpu: "4"
  storage: 10Gi

# PostgreSQL + pgvector
postgres:
  image: pgvector/pgvector:pg16
  database: airflow_db
  user: airflow_user
  password: airflow_pass
  storage: 5Gi
  pgvector:
    enabled: true
    embeddingDim: 32
    indexType: ivfflat
    indexLists: 100

# Kafka
kafka:
  image: confluentinc/cp-kafka:7.6.0
  storage: 5Gi
  topics:
    - name: raw-subscriptions
      partitions: 3
    - name: subscriptions_dlq
      partitions: 1
    - name: system-monitor
      partitions: 1

# Airflow
airflow:
  image: gmdh-airflow:latest
  webserverPort: 8080
  executor: LocalExecutor
  adminUser: admin
  adminPassword: admin

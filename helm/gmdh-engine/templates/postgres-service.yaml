apiVersion: v1
kind: Service
metadata:
  name: {{ include "gmdh.fullname" . }}-postgres
  labels:
    {{- include "gmdh.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
spec:
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: 5432
      protocol: TCP
  selector:
    app.kubernetes.io/component: postgres

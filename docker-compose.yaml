version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: gmdh-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: airflow_db
      MYSQL_USER: airflow_user
      MYSQL_PASSWORD: airflow_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gmdh_net

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: gmdh-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,DOCKER:PLAINTEXT'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@localhost:9093'
      KAFKA_LISTENERS: 'PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,DOCKER://0.0.0.0:29092'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://localhost:9092,DOCKER://gmdh-kafka:29092'
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - gmdh_net

  kafka-init:
    image: confluentinc/cp-kafka:7.6.0
    container_name: gmdh-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ['/bin/bash', '-c']
    command: |
      "
      kafka-topics --bootstrap-server gmdh-kafka:9092 --create --if-not-exists --topic raw-subscriptions --partitions 3 --replication-factor 1
      kafka-topics --bootstrap-server gmdh-kafka:9092 --create --if-not-exists --topic subscriptions_dlq --partitions 1 --replication-factor 1
      kafka-topics --bootstrap-server gmdh-kafka:9092 --create --if-not-exists --topic system-monitor --partitions 1 --replication-factor 1
      echo 'Topics created successfully'
      "
    networks:
      - gmdh_net

  localstack:
    image: localstack/localstack:2.3.2
    container_name: gmdh-localstack
    ports:
      - "4566:4566"
    environment:
      - SERVICES=kinesis,s3
      - DEFAULT_REGION=us-east-1
      - KINESIS_PROVIDER=kinesis-mock
      - KINESIS_INITIALIZE_STREAMS=telemetry-stream:1
      - SKIP_INFRA_DOWNLOADS=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gmdh_net

  airflow:
    build: .
    container_name: gmdh-airflow
    ports:
      - "8080:8080"
    volumes:
      - .:/opt/airflow/project
      - ./dags:/opt/airflow/dags
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=mysql+mysqldb://airflow_user:airflow_pass@gmdh-mysql:3306/airflow_db
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__CORE__DAGS_FOLDER=/opt/airflow/dags
      - AIRFLOW__WEBSERVER__WORKER_TIMEOUT=120
      - AIRFLOW__CORE__DAG_CONCURRENCY=2
      - AIRFLOW__CORE__MAX_ACTIVE_RUNS_PER_DAG=1
      - KINESIS_ENDPOINT=http://gmdh-localstack:4566
      - REGION=us-east-1
      - PYTHONPATH=/opt/airflow/project
    command: standalone
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_healthy
      localstack:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - gmdh_net

volumes:
  mysql_data:
  kafka_data:

networks:
  gmdh_net:
    driver: bridge
